name: jarvis
description: AI chat application with Gemini streaming.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  get_it: ^8.2.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.7+1
  skeletonizer: ^2.1.0
  path_provider: ^2.1.5
  image_picker: ^1.2.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1
  freezed: ^2.5.2

flutter:
  uses-material-design: true
  assets:
    - .env
